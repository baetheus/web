name: Test

on: [workflow_call]

jobs:
  test:
    strategy:
      matrix:
        deno: ["v2.7.14"]
        # os: [macOS-latest, windows-latest, ubuntu-latest]
        os: [macOS-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Setup repo
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ matrix.deno }}

      - name: Run Deno Tests
        run: deno test --parallel --coverage=coverage
